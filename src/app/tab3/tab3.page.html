<ion-header [translucent]="true" class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-title style="position: absolute; width: 100%; left: 0; text-align: center; pointer-events: none;">
      Settings
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" color="light" class="ion-padding">
  <ion-header collapse="condense" class="ion-no-border">
    <ion-toolbar color="light">
      <ion-title size="large" class="gradient-text ion-text-center" style="width: 100%;">Settings</ion-title>
    </ion-toolbar>
  </ion-header>

  <h3 class="ion-padding-start" style="color: #666; font-weight: 600;">General</h3>
  <ion-list inset="true" class="glass-list">
    <ion-item button lines="full">
      <ion-icon name="person-circle-outline" slot="start" color="primary"></ion-icon>
      <ion-label>
        <h2>Account</h2>
        <p>Manage your profile</p>
      </ion-label>
    </ion-item>

    <ion-item button lines="full" id="open-categories-modal">
      <ion-icon name="list-outline" slot="start" color="secondary"></ion-icon>
      <ion-label>
        <h2>Categories</h2>
        <p>Manage categories and subcategories</p>
      </ion-label>
    </ion-item>

    <ion-item button lines="full">
      <ion-icon name="notifications-outline" slot="start" color="tertiary"></ion-icon>
      <ion-label>
        <h2>Notifications</h2>
        <p>Alerts & Reminders</p>
      </ion-label>
    </ion-item>

    <ion-item button lines="full">
      <ion-icon name="color-palette-outline" slot="start" color="secondary"></ion-icon>
      <ion-label>
        <h2>Appearance</h2>
        <p>Dark mode, Themes</p>
      </ion-label>
    </ion-item>

    <ion-item button lines="none" (click)="clearData()">
      <ion-icon name="trash-outline" slot="start" color="danger"></ion-icon>
      <ion-label color="danger">
        <h2>Clear Data</h2>
      </ion-label>
    </ion-item>
  </ion-list>

  <p class="ion-text-center ion-margin-top" style="color: #888; font-size: 0.9rem;">
    ExpenseTracker v1.0.0<br>
    Angular 2026
  </p>

  <!-- Categories Modal -->
  <ion-modal trigger="open-categories-modal" #categoriesModal>
    <ng-template>
      <ion-header class="ion-no-border">
        <ion-toolbar color="primary">
          <ion-buttons slot="start">
            <ion-button (click)="closeCategoriesModal()">Close</ion-button>
          </ion-buttons>
          <ion-title>Categories & subcateg.</ion-title>
        </ion-toolbar>
      </ion-header>
      <ion-content class="ion-padding" color="light">
        <ion-list inset="true" class="glass-list">
          <!-- Add new category input -->
          <ion-item lines="full">
            <ion-input type="text" [(ngModel)]="newCategory" placeholder="New Category Name"></ion-input>
            <ion-button slot="end" fill="clear" (click)="addCategory()" [disabled]="!newCategory.trim()">
              <ion-icon name="add-circle" color="primary" slot="icon-only"></ion-icon>
            </ion-button>
          </ion-item>

          <!-- Render existing categories -->
          <ion-accordion-group>
            <ion-accordion *ngFor="let cat of dataService.categories()" [value]="cat.name">
              <ion-item slot="header" color="light">
                <!-- Normal View -->
                <ng-container *ngIf="editingCategory !== cat.name">
                  <ion-label><b>{{ cat.name }}</b></ion-label>
                  <ion-button slot="end" fill="clear" color="secondary"
                    (click)="startEdit(cat.name); $event.stopPropagation()">
                    <ion-icon name="create-outline" slot="icon-only"></ion-icon>
                  </ion-button>
                  <ion-button slot="end" fill="clear" color="danger"
                    (click)="deleteCategory(cat.name); $event.stopPropagation()">
                    <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
                  </ion-button>
                </ng-container>

                <!-- Edit View -->
                <ng-container *ngIf="editingCategory === cat.name">
                  <ion-input type="text" [(ngModel)]="editCategoryValue" (click)="$event.stopPropagation()"
                    (keyup.enter)="saveEdit()"></ion-input>
                  <ion-button slot="end" fill="clear" color="success" (click)="saveEdit(); $event.stopPropagation()"
                    [disabled]="!editCategoryValue.trim()">
                    <ion-icon name="checkmark-outline" slot="icon-only"></ion-icon>
                  </ion-button>
                  <ion-button slot="end" fill="clear" color="medium" (click)="cancelEdit(); $event.stopPropagation()">
                    <ion-icon name="close-outline" slot="icon-only"></ion-icon>
                  </ion-button>
                </ng-container>
              </ion-item>

              <div class="ion-padding" slot="content">
                <ion-list lines="inset">
                  <ion-item *ngFor="let sub of cat.subcategories">
                    <!-- Sub Normal View -->
                    <ng-container *ngIf="editingSubcategory?.parent !== cat.name || editingSubcategory?.oldSub !== sub">
                      <ion-label>{{ sub }}</ion-label>
                      <ion-button slot="end" fill="clear" color="secondary" (click)="startEditSub(cat.name, sub)">
                        <ion-icon name="create-outline" slot="icon-only"></ion-icon>
                      </ion-button>
                      <ion-button slot="end" fill="clear" color="danger" (click)="deleteSubcategory(cat.name, sub)">
                        <ion-icon name="trash-outline" slot="icon-only"></ion-icon>
                      </ion-button>
                    </ng-container>

                    <!-- Sub Edit View -->
                    <ng-container *ngIf="editingSubcategory?.parent === cat.name && editingSubcategory?.oldSub === sub">
                      <ion-input type="text" [(ngModel)]="editSubcategoryValue"
                        (keyup.enter)="saveEditSub()"></ion-input>
                      <ion-button slot="end" fill="clear" color="success" (click)="saveEditSub()"
                        [disabled]="!editSubcategoryValue.trim()">
                        <ion-icon name="checkmark-outline" slot="icon-only"></ion-icon>
                      </ion-button>
                      <ion-button slot="end" fill="clear" color="medium" (click)="cancelEditSub()">
                        <ion-icon name="close-outline" slot="icon-only"></ion-icon>
                      </ion-button>
                    </ng-container>
                  </ion-item>

                  <ion-item>
                    <ion-input type="text" [(ngModel)]="newSubcategory[cat.name]"
                      placeholder="New Subcategory"></ion-input>
                    <ion-button slot="end" fill="clear" (click)="addSubcategory(cat.name)"
                      [disabled]="!newSubcategory[cat.name]?.trim()">
                      <ion-icon name="add-circle" color="tertiary" slot="icon-only"></ion-icon>
                    </ion-button>
                  </ion-item>
                </ion-list>
              </div>
            </ion-accordion>
          </ion-accordion-group>
        </ion-list>
      </ion-content>
    </ng-template>
  </ion-modal>
</ion-content>
