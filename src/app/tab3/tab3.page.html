<ion-header [translucent]="true" class="ion-no-border">
  <ion-toolbar color="primary">
    <ion-title>
      Settings
    </ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" color="light" class="ion-padding">
  <ion-header collapse="condense" class="ion-no-border">
    <ion-toolbar color="light">
      <ion-title size="large" class="gradient-text">Settings</ion-title>
    </ion-toolbar>
  </ion-header>

  <ion-list inset="true" class="glass-list">
    <ion-item button lines="full">
      <ion-icon name="person-circle-outline" slot="start" color="primary"></ion-icon>
      <ion-label>
        <h2>Account</h2>
        <p>Manage your profile</p>
      </ion-label>
    </ion-item>
    
    <ion-item button lines="full">
      <ion-icon name="notifications-outline" slot="start" color="tertiary"></ion-icon>
      <ion-label>
        <h2>Notifications</h2>
        <p>Alerts & Reminders</p>
      </ion-label>
    </ion-item>

    <ion-item button lines="full">
      <ion-icon name="color-palette-outline" slot="start" color="secondary"></ion-icon>
      <ion-label>
        <h2>Appearance</h2>
        <p>Dark mode, Themes</p>
      </ion-label>
    </ion-item>
    
    <ion-item button lines="none" (click)="clearData()">
      <ion-icon name="trash-outline" slot="start" color="danger"></ion-icon>
      <ion-label color="danger">
        <h2>Clear Data</h2>
      </ion-label>
    </ion-item>
  </ion-list>
  
  <p class="ion-text-center ion-margin-top" style="color: #888; font-size: 0.9rem;">
    ExpenseTracker v1.0.0<br>
    Angular 2026
  </p>
</ion-content>
